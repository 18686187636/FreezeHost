name: FreezeHost 续期

on:
  workflow_dispatch:
    inputs:
      token_number:
        description: '选择 Token 编号'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      actions: write

    steps:
      - name: 选择 Token
        id: select_token
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TOKEN_NUM="${{ github.event.inputs.token_number }}"
          else
            TOKEN_NUM=1
          fi
          echo "token_number=$TOKEN_NUM" >> "$GITHUB_OUTPUT"

      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装环境
        run: |
          pip install playwright
          playwright install chromium --with-deps
          sudo apt-get update
          sudo apt-get install -y jq bc net-tools curl

      - name: 配置代理（sing-box 解析 NODE_LINK）
        id: setup_proxy
        if: env.NODE_LINK != ''
        env:
          NODE_LINK: ${{ secrets.NODE_LINK }}
        run: |
          set -e
          echo "⬇️ 下载 sing-box 二进制..."
          # 获取最新版本下载链接（过滤 alpha/beta/rc）
          LATEST_URL=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | \
            grep -o '"browser_download_url": "[^"]*linux-amd64[^"]*"' | \
            grep -v 'alpha\|beta\|rc' | head -1 | sed 's/"browser_download_url": "//' | sed 's/"//')
          if [ -z "$LATEST_URL" ]; then echo "❌ 无法获取下载链接"; exit 1; fi
          echo "📥 下载地址: $LATEST_URL"
          for i in {1..3}; do
            echo "尝试 $i/3..."
            curl -L -o sing-box.tar.gz "$LATEST_URL" --connect-timeout 30 --max-time 60
            if [ -f sing-box.tar.gz ] && file sing-box.tar.gz | grep -q 'gzip compressed data'; then
              echo "✅ 下载成功"; break
            fi
            echo "⚠️ 重试..."; rm -f sing-box.tar.gz; sleep 3
          done
          [ -f sing-box.tar.gz ] || { echo "❌ 下载失败"; exit 1; }
          tar -xzf sing-box.tar.gz
          SING_BOX_DIR=$(find . -maxdepth 1 -type d -name "sing-box-*" | head -1)
          [ -z "$SING_BOX_DIR" ] && { echo "❌ 解压失败"; exit 1; }
          sudo mv "$SING_BOX_DIR/sing-box" /usr/local/bin/
          sudo chmod +x /usr/local/bin/sing-box
          rm -rf sing-box.tar.gz "$SING_BOX_DIR"
          sing-box version

          echo "📝 解析节点链接并生成配置文件..."
          # 清理链接（移除空白字符）
          VLESS=$(echo "${NODE_LINK}" | tr -d ' \n\r\t')
          export VLESS
          # 检查是否 vless 协议（可根据需要扩展支持 vmess/trojan）
          if [[ ! "$VLESS" =~ ^vless:// ]]; then
            echo "⚠️ 当前仅支持 vless:// 协议，尝试直接作为订阅链接转换..."
            # 尝试使用 sing-box convert 转换（支持大部分标准链接）
            if echo "$VLESS" | /usr/local/bin/sing-box convert link - > /tmp/outbound.json 2>/dev/null; then
              if [ -s /tmp/outbound.json ]; then
                echo "✅ sing-box 原生转换成功"
                # 构建完整配置
                echo '{"inbounds":[{"type":"socks","listen":"127.0.0.1","listen_port":1080,"tag":"socks-in"}],"outbounds":' > sing-box-config.json
                cat /tmp/outbound.json >> sing-box-config.json
                echo '}' >> sing-box-config.json
                cat sing-box-config.json
              else
                echo "❌ 转换失败"
                exit 1
              fi
            else
              echo "❌ 不支持的链接格式，请使用 vless://"
              exit 1
            fi
          else
            # 使用 Python 解析 vless 链接（参考 Bot-hosting 方案）
            python3 << 'PYEOF'
            import json, sys, os, re
            from urllib.parse import urlparse, parse_qs

            link = os.environ.get('VLESS', '')
            if not link:
                sys.exit(1)

            parsed = urlparse(link)
            if parsed.scheme != 'vless':
                sys.exit(1)

            netloc = parsed.netloc
            if '@' in netloc:
                uuid, host_port = netloc.split('@', 1)
            else:
                uuid, host_port = '', netloc

            host = ''
            port = '443'
            bracket_match = re.match(r'^\[([^\]]+)\](?::(\d+))?$', host_port)
            if bracket_match:
                host = bracket_match.group(1)
                if bracket_match.group(2):
                    port = bracket_match.group(2)
            else:
                if host_port.count(':') > 1:
                    host = host_port
                else:
                    if ':' in host_port:
                        host, port = host_port.split(':', 1)
                    else:
                        host = host_port

            if not host:
                print(f"❌ 无法解析主机地址: {host_port}", file=sys.stderr)
                sys.exit(1)

            params = parse_qs(parsed.query)
            sni = params.get('sni', [''])[0] or host
            fp = params.get('fp', [''])[0] or 'chrome'
            flow = params.get('flow', [''])[0] or 'xtls-rprx-vision'
            type_ = params.get('type', ['tcp'])[0]
            security = params.get('security', [''])[0]

            outbound = {
                "type": "vless",
                "tag": "vless-out",
                "server": host,
                "server_port": int(port),
                "uuid": uuid,
                "flow": flow,
                "tls": {
                    "enabled": True,
                    "server_name": sni,
                    "insecure": False,
                    "utls": {"enabled": True, "fingerprint": fp}
                },
                "packet_encoding": "packetaddr"
            }
            if type_ != 'tcp':
                outbound["transport"] = {"type": type_}
            if security == 'reality':
                pbk = params.get('pbk', [''])[0]
                sid = params.get('sid', [''])[0]
                outbound['tls']['reality'] = {"enabled": True, "public_key": pbk, "short_id": sid}

            config = {
                "log": {"level": "warn"},
                "inbounds": [{"type": "socks", "tag": "socks-in", "listen": "127.0.0.1", "listen_port": 1080}],
                "outbounds": [outbound],
                "route": {"rules": [{"outbound": "vless-out", "protocol": ["tcp", "udp"]}]}
            }
            with open("sing-box-config.json", "w") as f:
                json.dump(config, f, indent=2)
            print("✅ vless 配置已生成")
            PYEOF
            [ -f sing-box-config.json ] || { echo "❌ Python 解析失败"; exit 1; }
          fi

          echo "🚀 启动 sing-box..."
          nohup sing-box -c sing-box-config.json run > sing-box.log 2>&1 &
          sleep 5
          if netstat -tuln | grep -q ':1080'; then
            echo "✅ 代理已启动（127.0.0.1:1080）"
            echo "PROXY_URL=socks5://127.0.0.1:1080" >> $GITHUB_ENV
          else
            echo "❌ 代理启动失败，查看日志："
            cat sing-box.log
            exit 1
          fi

      - name: 设置 Discord Token
        run: |
          TOKEN_NUM="${{ steps.select_token.outputs.token_number }}"
          case "$TOKEN_NUM" in
            1) echo "DISCORD_TOKEN=${{ secrets.FREEZEHOST_DISCORD_TOKEN_1 }}" >> "$GITHUB_ENV" ;;
            2) echo "DISCORD_TOKEN=${{ secrets.FREEZEHOST_DISCORD_TOKEN_2 }}" >> "$GITHUB_ENV" ;;
            3) echo "DISCORD_TOKEN=${{ secrets.FREEZEHOST_DISCORD_TOKEN_3 }}" >> "$GITHUB_ENV" ;;
            4) echo "DISCORD_TOKEN=${{ secrets.FREEZEHOST_DISCORD_TOKEN_4 }}" >> "$GITHUB_ENV" ;;
            5) echo "DISCORD_TOKEN=${{ secrets.FREEZEHOST_DISCORD_TOKEN_5 }}" >> "$GITHUB_ENV" ;;
          esac

      - name: 运行续期脚本
        env:
          FREEZEHOST_DISCORD_TOKEN: ${{ env.DISCORD_TOKEN }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY_URL: ${{ env.PROXY_URL }}
        run: |
          python renew.py 2>&1 | tee renew.log

      - name: 提取剩余天数
        id: extract_days
        if: always()
        run: |
          MIN_DAYS=""
          if [ -f "renew_result.json" ]; then
            MIN_DAYS=$(jq -r '.min_remaining_days // empty' renew_result.json)
          fi
          if [ -z "$MIN_DAYS" ] && [ -f "renew.log" ]; then
            MIN_DAYS=$(grep -oP '剩余\s*[\d.]+' renew.log | grep -oP '[\d.]+' | sort -n | head -1 || echo "0.5")
          fi
          if [ -z "$MIN_DAYS" ]; then MIN_DAYS="0.5"; fi
          echo "remaining_days=$MIN_DAYS" >> "$GITHUB_OUTPUT"
          echo "剩余天数: $MIN_DAYS"

      - name: 更新 Cron（简版，可按需完善）
        if: success() && steps.extract_days.outputs.remaining_days != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          token: ${{ secrets.REPO_TOKEN }}
          path: workflow_repo
          fetch-depth: 1

      - name: 修改 Cron
        if: success() && steps.extract_days.outputs.remaining_days != ''
        run: |
          cd workflow_repo
          NEW_CRON="0 0 * * *"  # 占位，可根据 remaining_days 计算
          sed -i "s/- cron: .*/- cron: '$NEW_CRON'/" .github/workflows/FreezeHost_Renew.yml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/FreezeHost_Renew.yml
          git commit -m "更新 Cron" || exit 0
          git remote set-url origin "https://x-access-token:${{ secrets.REPO_TOKEN }}@github.com/${{ github.repository }}.git"
          git push || exit 0

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
          retention-days: 7

      - name: 清理历史
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 30
          keep_minimum_runs: 5
